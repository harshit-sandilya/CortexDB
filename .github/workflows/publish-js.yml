name: Publish JS SDK

on:
  release:
    types: [published]
  # Alternatively, you can trigger on tag pushes:
  # push:
  #   tags:
  #     - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortexdb-js
        
    permissions:
      contents: read
      packages: write   # Needed for GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@harshit-sandilya'
          cache: 'npm'
          cache-dependency-path: cortexdb-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Publish to GitHub Packages
        # package.json already has publishConfig pointing to github
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node for NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@harshit-sandilya'

      - name: Publish to NPM
        run: |
          npm pkg delete publishConfig
          
          # 1. Force the scope to route to NPM instead of GitHub
          echo "@harshit-sandilya:registry=https://registry.npmjs.org/" > .npmrc
          
          # 2. Append the authentication token
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          
          # 3. Publish
          npm publish --access public
        env:
          # Make sure this points to your actual NPM secret! 
          # (e.g., secrets.NPM_AUTH_TOKEN if you renamed it)
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
