name: Publish JS SDK

on:
  release:
    types: [published]

jobs:
  publish-github:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortexdb-js
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@harshit-sandilya'
          cache: 'npm'
          cache-dependency-path: cortexdb-js/package-lock.json

      - name: Install & Build
        run: npm ci && npm run build

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortexdb-js
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node for NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@harshit-sandilya'
          cache: 'npm'
          cache-dependency-path: cortexdb-js/package-lock.json

      - name: Install & Build
        run: npm ci && npm run build

      - name: Remove GitHub publishConfig
        run: npm pkg delete publishConfig

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}