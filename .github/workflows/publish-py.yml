name: Publish Python SDK

on:
  release:
    types: [published]

jobs:
  publish-github:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortexdb-py
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Poetry and Twine
        run: pip install poetry twine

      - name: Build package
        run: poetry build

      - name: Publish to GitHub Packages
        run: |
          twine upload \
            --repository-url https://upload.pypi.pkg.github.com/harshit-sandilya/ \
            --username __token__ \
            --password ${{ secrets.ACCESS_TOKEN }} \
            --non-interactive \
            dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cortexdb-py
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Poetry
        run: pip install poetry

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        run: |
          poetry config pypi-token.pypi ${{ secrets.PYPI_API_TOKEN }}
          poetry publish
