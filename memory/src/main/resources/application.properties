spring.application.name=memory
spring.main.allow-bean-definition-overriding=true

# 1. Feed dummy credentials to bypass the aggressive validation crashes
spring.ai.azure.openai.endpoint=https://dummy.openai.azure.com
spring.ai.azure.openai.api-key=dummy
spring.ai.openai.api-key=dummy

# 2. THE NUCLEAR OPTION: Force Spring Boot to completely blind itself to the PgVector Auto-config class
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration